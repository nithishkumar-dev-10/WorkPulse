

mode: "sample"           

sample_size: 5000        

paths:
  raw_data:    "data/raw/resume_dataset.csv"
  processed:   "data/processed/cleaned.csv"
  splits:      "data/splits/"
  artifacts:   "artifacts/"
  logs:        "logs/pipeline.log"
  reports:     "reports/"

split:
  test_size:    0.20
  random_state: 42
  stratify:     true

smote:
  apply:        true
  random_state: 42

logging:
  level: "INFO"
