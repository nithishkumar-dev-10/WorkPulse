

target: "Hired"

numerical_features:
  - CGPA
  - YearsExperience
  - SkillsScore
  - SoftSkillsScore
  - Projects
  - Hackathons
  - ResearchPapers
  - Internships
  - Certifications
  - Languages_count

categorical_features:
  - EducationLevel
  - UniversityTier
  - CompanyType
  - ProgrammingLanguages

outlier_columns:
  - CGPA
  - YearsExperience
  - SkillsScore
  - SoftSkillsScore

# Ordinal encoding maps
ordinal_maps:
  EducationLevel:
    "High School": 1
    "Bachelor":    2
    "Master":      3
    "PhD":         4

  UniversityTier:
    "Tier 3": 1
    "Tier 2": 2
    "Tier 1": 3

# One-hot encode these
onehot_columns:
  - CompanyType
  - ProgrammingLanguages

# Final engineered feature list (after feature_engineering.py)
engineered_features:
  - EmployabilityScore
  - PortfolioStrength
  - TechnicalReadiness
  - ExperienceQuality
  - LearningIndex
  - ProfileCompleteness
  - SkillExperienceGap
